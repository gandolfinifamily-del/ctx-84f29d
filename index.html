<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spese Famiglia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0f172a; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }
        .safe-top { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="text-slate-100 select-none antialiased">

    <div id="status-bar" class="fixed top-0 left-0 right-0 z-50 text-center text-[11px] font-medium py-1 bg-slate-900/80 backdrop-blur border-b border-slate-800 safe-top hidden">
        <span id="status-text" class="text-teal-400">Sincronizzazione completata</span>
    </div>

    <div id="schermata-pin" class="fixed inset-0 bg-slate-950 z-50 flex flex-col justify-center items-center px-6">
        <div class="w-full max-w-sm text-center space-y-8">
            <div class="space-y-2">
                <div class="w-16 h-16 bg-gradient-to-tr from-teal-500 to-emerald-400 rounded-2xl flex items-center justify-center mx-auto shadow-lg shadow-teal-500/20">
                    <i class="fa-solid fa-vault text-2xl text-slate-950"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-200 pt-2">Accesso Protetto</h1>
                <p class="text-xs text-slate-400">Inserisci il codice di sicurezza familiare</p>
            </div>
            <div class="space-y-4">
                <input id="input-pin" type="password" pattern="[0-9]*" inputmode="numeric" maxlength="6" placeholder="••••" class="w-full bg-slate-900 border border-slate-800 text-center text-2xl tracking-[1em] font-bold py-3.5 rounded-2xl text-teal-400 focus:outline-none focus:border-teal-500 transition-all shadow-inner placeholder:tracking-normal placeholder:text-slate-700">
                <button onclick="verificaEAttivaPIN()" class="w-full bg-teal-500 text-slate-950 font-bold py-3.5 rounded-2xl active:scale-[0.98] transition-all shadow-md shadow-teal-500/10 text-sm">Sblocca Applicazione</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="min-h-screen flex flex-col max-w-md mx-auto bg-slate-900 shadow-2xl relative pb-24 safe-top">
        
        <div class="p-5 pb-2 space-y-4">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Bilancio Familiare</p>
                    <h2 class="text-xl font-bold text-slate-200">Ciao, <span id="label-utente" class="text-teal-400 capitalize">Mattia</span> 👋</h2>
                </div>
                <div class="flex space-x-2">
                    <button onclick="forzaSincronizzazione()" class="w-10 h-10 bg-slate-800/80 border border-slate-700 rounded-xl flex items-center justify-center active:scale-95 transition-all"><i class="fa-solid fa-rotate text-sm text-slate-400"></i></button>
                    <button onclick="cambiaSchermata('view-impostazioni')" class="w-10 h-10 bg-slate-800/80 border border-slate-700 rounded-xl flex items-center justify-center active:scale-95 transition-all"><i class="fa-solid fa-gear text-sm text-slate-400"></i></button>
                </div>
            </div>

            <div class="bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700/60 rounded-3xl p-5 relative overflow-hidden shadow-lg">
                <p class="text-xs font-medium text-slate-400">Uscite Totali Mese Corrente</p>
                <h3 id="totale-mese" class="text-3xl font-black tracking-tight text-slate-100 mt-1">€ 0.00</h3>
            </div>

            <div class="space-y-1.5">
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-autore-mattia" onclick="selezionaAutore('mattia')" class="p-2.5 rounded-xl border text-xs font-bold flex items-center justify-center space-x-2 transition-all bg-teal-500/10 border-teal-500/30 text-teal-400">
                        <i class="fa-solid fa-user-tie"></i> <span>Mattia</span>
                    </button>
                    <button id="btn-autore-claudia" onclick="selezionaAutore('claudia')" class="p-2.5 rounded-xl border text-xs font-bold flex items-center justify-center space-x-2 transition-all bg-slate-800/80 border-slate-700/80 text-slate-400">
                        <i class="fa-solid fa-user-ninja"></i> <span>Claudia</span>
                    </button>
                </div>
            </div>

            <div class="space-y-1.5">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 pl-0.5">Seleziona / Rettifica Categoria</p>
                <div id="grid-categorie" class="grid grid-cols-3 gap-2">
                    </div>
            </div>
        </div>

        <div id="view-home" class="view-content px-5 py-2 space-y-4">
            <div class="bg-slate-950/40 border border-slate-800/60 rounded-2xl p-4 text-center">
                <p class="text-xs text-slate-400">Seleziona una categoria qui sopra per iniziare a registrare una nuova spesa.</p>
            </div>
        </div>

        <div id="view-movimenti" class="view-content px-5 py-2 space-y-3 hidden">
            <div class="flex justify-between items-center pb-1">
                <h4 class="text-sm font-bold text-slate-300">Registro Spese Cloud</h4>
                <button onclick="forzaSincronizzazione()" class="text-[11px] font-bold text-teal-40
